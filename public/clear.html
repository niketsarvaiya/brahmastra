<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Brahmastra — Clear Dev Data</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #e4e4e7; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: #18181b; border: 1px solid #27272a; border-radius: 16px; padding: 40px; max-width: 420px; width: 100%; text-align: center; }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
    .sub { font-size: 13px; color: #71717a; margin-bottom: 28px; line-height: 1.6; }
    .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s; margin-bottom: 10px; }
    .btn-clear { background: #450a0a; color: #fca5a5; border: 1px solid #7f1d1d; }
    .btn-clear:hover { background: #7f1d1d; }
    .btn-go { background: #ffffff; color: #0f0f0f; }
    .btn-go:hover { background: #e4e4e7; }
    .status { font-size: 13px; margin-top: 16px; padding: 12px 16px; border-radius: 8px; display: none; }
    .status.success { background: #14532d; color: #86efac; display: block; }
    .status.error { background: #450a0a; color: #fca5a5; display: block; }
    .note { font-size: 12px; color: #52525b; margin-top: 16px; }
  </style>
</head>
<body>
<div class="card">
  <h1>Brahmastra Dev Reset</h1>
  <p class="sub">
    Clears all Brahmastra project data from this browser.<br>
    Projects will re-sync automatically from BOQ Builder.
  </p>
  <button class="btn btn-clear" onclick="clearData()">🗑 Clear brahmastra_projects</button>
  <button class="btn btn-go" id="goBtn" style="display:none" onclick="window.location.href='/'">Open Brahmastra →</button>
  <div class="status" id="status"></div>
  <p class="note">Key cleared: <code>brahmastra_projects</code></p>
</div>
<script>
function clearData() {
  try {
    localStorage.removeItem('brahmastra_projects');
    var s = document.getElementById('status');
    s.className = 'status success';
    s.textContent = '✓ brahmastra_projects cleared. Open the app — projects will sync from BOQ Builder automatically.';
    document.getElementById('goBtn').style.display = 'block';
  } catch(e) {
    var s = document.getElementById('status');
    s.className = 'status error';
    s.textContent = '✗ Error: ' + e.message;
  }
}
</script>
</body>
</html>
